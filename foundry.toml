[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
ffi = false
fs_permissions = [
    { access = "read", path = "./out" },
    { access = "write", path = "./" },
]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[lint]
exclude_lints = [
    "mixed-case-function",
    "mixed-case-variable",
    "pascal-case-struct",
    "screaming-snake-case-immutable",
    "unwrapped-modifier-logic",
    "asm-keccak256",
    "unused-import",
    "unsafe-cheatcode",
]

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
override_spacing = false
wrap_comments = true
